version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENV=production
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      # In production, Next.js calls backend externally probably via a load balancer, but if the browser makes client calls, NEXT_PUBLIC_API_URL should be the real public domain block.
      # For standard full stack deployment, they run on same domain and proxy.
      - NEXT_PUBLIC_API_URL=/api
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend
